<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sarah-Jeanne Raymond | Communications Portfolio</title>
  <meta name="description" content="Public affairs, communications and community-building portfolio connecting Québec and New York." />
  <style>
    :root {
      --cream: #f7efe7;
      --sand: #e9d7c3;
      --blush: #d8a6a1;
      --terracotta: #b96755;
      --brown: #402820;
      --ink: #2d201c;
      --white: #fffaf5;
      --blue: #1f5fbf;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: var(--cream);
      color: var(--ink);
      line-height: 1.6;
    }

    img {
      max-width: 100%;
      display: block;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .container {
      width: min(1120px, 92%);
      margin: 0 auto;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(247, 239, 231, 0.92);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(64, 40, 32, 0.08);
    }

    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 0;
    }

    .logo {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .nav-links {
      display: flex;
      gap: 24px;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .nav-links a:hover {
      color: var(--terracotta);
    }

    .hero {
      padding: 90px 0 70px;
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 46px;
      align-items: center;
    }

    .eyebrow {
      color: var(--terracotta);
      text-transform: uppercase;
      letter-spacing: 0.14em;
      font-size: 0.8rem;
      font-weight: 700;
      margin-bottom: 16px;
    }

    h1, h2, h3 {
      font-family: Georgia, 'Times New Roman', serif;
      line-height: 1.05;
      color: var(--brown);
    }

    h1 {
      font-size: clamp(3rem, 8vw, 6.5rem);
      margin-bottom: 24px;
    }

    h2 {
      font-size: clamp(2.1rem, 5vw, 4.4rem);
      margin-bottom: 18px;
    }

    h3 {
      font-size: 1.7rem;
      margin-bottom: 12px;
    }

    .hero p {
      font-size: 1.15rem;
      max-width: 620px;
      margin-bottom: 28px;
    }

    .buttons {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
    }

    .button {
      padding: 13px 22px;
      border-radius: 999px;
      border: 1px solid var(--brown);
      font-weight: 700;
      transition: 0.2s ease;
    }

    .button.primary {
      background: var(--brown);
      color: var(--white);
    }

    .button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(64, 40, 32, 0.12);
    }

    .hero-card {
      background: var(--sand);
      padding: 18px;
      border-radius: 34px;
      transform: rotate(2deg);
      box-shadow: 0 24px 60px rgba(64, 40, 32, 0.16);
    }

    .mock-photo {
      min-height: 480px;
      border-radius: 26px;
      background: linear-gradient(135deg, var(--blush), var(--terracotta));
      display: grid;
      place-items: center;
      text-align: center;
      color: var(--white);
      padding: 40px;
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 2.2rem;
    }

    section {
      padding: 76px 0;
    }

    .intro {
      background: var(--white);
      border-top: 1px solid rgba(64, 40, 32, 0.08);
      border-bottom: 1px solid rgba(64, 40, 32, 0.08);
    }

    .intro-grid {
      display: grid;
      grid-template-columns: 0.8fr 1.2fr;
      gap: 46px;
      align-items: start;
    }

    .big-text {
      font-size: clamp(1.4rem, 3vw, 2.3rem);
      font-family: Georgia, 'Times New Roman', serif;
      color: var(--brown);
      line-height: 1.22;
    }

    .visual-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-top: 34px;
    }

    .tile {
      min-height: 220px;
      border-radius: 24px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      background: var(--sand);
      overflow: hidden;
      position: relative;
    }

    .tile:nth-child(2), .tile:nth-child(5) {
      background: var(--blush);
    }

    .tile:nth-child(3), .tile:nth-child(6) {
      background: var(--terracotta);
      color: var(--white);
    }

    .tile.large {
      grid-column: span 2;
      min-height: 300px;
    }

    .tile .number {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 4rem;
      opacity: 0.35;
    }

    .tile p {
      font-weight: 700;
      font-size: 1.05rem;
    }

    .section-heading {
      display: flex;
      justify-content: space-between;
      gap: 24px;
      align-items: end;
      margin-bottom: 34px;
    }

    .section-heading p {
      max-width: 440px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 22px;
    }

    .card {
      background: var(--white);
      padding: 28px;
      border-radius: 28px;
      border: 1px solid rgba(64, 40, 32, 0.08);
      box-shadow: 0 16px 35px rgba(64, 40, 32, 0.08);
    }

    .tag {
      display: inline-block;
      background: var(--cream);
      color: var(--terracotta);
      padding: 6px 11px;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 18px;
    }

    .card ul {
      margin: 16px 0 0 18px;
    }

    .card li {
      margin-bottom: 8px;
    }

    .what-i-do {
      background: var(--brown);
      color: var(--white);
    }

    .what-i-do h2 {
      color: var(--white);
    }

    .what-i-do .text-block {
      max-width: 820px;
      font-size: 1.15rem;
    }

    .services {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      margin-top: 30px;
    }

    .service {
      background: rgba(255, 250, 245, 0.1);
